<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#0f2a2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="600" y1="100" x2="600" y2="530" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e293b" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e293b" stroke-width="1"/>

  <!-- Glow orb center top -->
  <ellipse cx="600" cy="200" rx="300" ry="200" fill="url(#glowGrad)"/>

  <!-- Large decorative coral right side -->
  <!-- trunk -->
  <line x1="920" y1="520" x2="920" y2="350" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- branches -->
  <line x1="920" y1="420" x2="860" y2="320" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <line x1="920" y1="390" x2="990" y2="290" stroke="#14b8a6" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <line x1="860" y1="320" x2="820" y2="250" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="860" y1="320" x2="870" y2="240" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="990" y1="290" x2="1040" y2="220" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="990" y1="290" x2="980" y2="215" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <!-- tips glow -->
  <circle cx="820" cy="248" r="7" fill="#22d3ee" opacity="0.7" filter="url(#glow)"/>
  <circle cx="870" cy="238" r="6" fill="#22d3ee" opacity="0.65" filter="url(#glow)"/>
  <circle cx="1040" cy="218" r="7" fill="#14b8a6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="980" cy="213" r="6" fill="#14b8a6" opacity="0.65" filter="url(#glow)"/>
  <circle cx="920" cy="348" r="9" fill="#0e7490" opacity="0.5"/>

  <!-- Small decorative coral left side -->
  <line x1="200" y1="520" x2="200" y2="410" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="200" y1="460" x2="160" y2="390" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" opacity="0.28"/>
  <line x1="200" y1="440" x2="245" y2="375" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" opacity="0.28"/>
  <circle cx="160" cy="387" r="5" fill="#22d3ee" opacity="0.55" filter="url(#glow)"/>
  <circle cx="245" cy="373" r="5" fill="#14b8a6" opacity="0.55" filter="url(#glow)"/>

  <!-- Logo icon -->
  <g transform="translate(488, 120)" filter="url(#softglow)">
    <rect width="112" height="112" rx="24" fill="#0f2a2a" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.4"/>
    <!-- coral in icon -->
    <line x1="56" y1="90" x2="56" y2="60" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="72" x2="38" y2="50" stroke="url(#cyanGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="56" y1="65" x2="74" y2="43" stroke="url(#cyanGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="38" y1="50" x2="26" y2="36" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
    <line x1="74" y1="43" x2="86" y2="29" stroke="#14b8a6" stroke-width="4" stroke-linecap="round"/>
    <circle cx="26" cy="33" r="5" fill="#22d3ee"/>
    <circle cx="86" cy="27" r="5" fill="#14b8a6"/>
    <circle cx="56" cy="90" r="6" fill="#0e7490" opacity="0.7"/>
  </g>

  <!-- FragX wordmark -->
  <text x="600" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">Frag<tspan fill="url(#cyanGrad)">X</tspan></text>

  <!-- Tagline -->
  <text x="600" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="2">CORAL MARKETPLACE &amp; PRICE TRACKER</text>

  <!-- Divider line -->
  <line x1="480" y1="378" x2="720" y2="378" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Feature pills -->
  <rect x="310" y="400" width="160" height="40" rx="20" fill="#0f2a2a" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <text x="390" y="425" font-family="system-ui, sans-serif" font-size="15" fill="#22d3ee" text-anchor="middle" font-weight="500">Buy &amp; Sell Frags</text>

  <rect x="520" y="400" width="160" height="40" rx="20" fill="#0f2a2a" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="600" y="425" font-family="system-ui, sans-serif" font-size="15" fill="#14b8a6" text-anchor="middle" font-weight="500">Price Tracking</text>

  <rect x="730" y="400" width="160" height="40" rx="20" fill="#0f2a2a" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <text x="810" y="425" font-family="system-ui, sans-serif" font-size="15" fill="#22d3ee" text-anchor="middle" font-weight="500">Vendor Prices</text>

  <!-- Bottom border glow -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#cyanGrad)" opacity="0.35" rx="0"/>
</svg>
